# strict-clippy.sh points CLIPPY_CONF_DIR here to override project configuration.
# Lint levels live in clippy-lints.txt because this file configures behavior.

# Review public APIs too. Never apply a breaking suggestion mechanically.
avoid-breaking-exported-api = false

# Surface review candidates early. Agents must not introduce parameter structs,
# wrappers, or helpers solely to satisfy these thresholds; use a narrow,
# reasoned lint exception when the current shape is clearer.
cognitive-complexity-threshold = 20
too-many-arguments-threshold = 5
too-many-lines-threshold = 80
type-complexity-threshold = 180
max-fn-params-bools = 1
max-struct-bools = 2

# Flag large values, stack use, and expensive moves before they become hidden
# performance or reliability costs. Low-level and HPC code may keep an
# intentional occurrence with a local, reasoned exception.
array-size-threshold = 8192
enum-variant-size-threshold = 128
future-size-threshold = 8192
large-error-threshold = 96
pass-by-value-size-limit = 128
stack-size-threshold = 262144
too-large-for-stack = 128
trivial-copy-size-limit = 8

# Apply API documentation checks to private items only when the lint itself is
# enabled; this catches hidden error/panic contracts during focused reviews.
check-private-items = true
check-incompatible-msrv-in-tests = true

# Audit tests with the same panic, indexing, output, and debugging policy as
# production code. Individual tests may use a narrow exception with a reason
# that states the fixture or assertion invariant.
allow-dbg-in-tests = false
allow-expect-in-tests = false
allow-indexing-slicing-in-tests = false
allow-panic-in-tests = false
allow-print-in-tests = false
allow-unwrap-in-tests = false
allow-expect-in-consts = false
allow-unwrap-in-consts = false
allow-large-stack-frames-in-tests = false

# A SAFETY comment must be attached to the unsafe block it justifies. Do not
# accept a comment separated from the block by attributes or another statement.
accept-comment-above-attributes = false
accept-comment-above-statement = false

# Enforce Rust acronym casing consistently.
upper-case-acronyms-aggressive = true
